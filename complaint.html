<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客訴管理系統</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --primary-dark: #1d4ed8;
      --success: #27ae60;
      --warning: #f39c12;
      --info: #2980b9;
      --purple: #8e44ad;
      --gray: #95a5a6;
      --danger: #e74c3c;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e0e0;
      --bg: #f5f6fa;
      --white: #ffffff;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .site-header {
      background: var(--primary);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      box-shadow: 0 2px 8px rgba(224,90,43,0.3);
    }
    .site-header h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .role-switch {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.15);
      padding: 4px;
      border-radius: 20px;
    }
    .role-btn {
      padding: 5px 16px;
      border: none;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: rgba(255,255,255,0.75);
    }
    .role-btn.active { background: white; color: var(--primary); font-weight: 600; }
    .main-container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .tab-bar {
      display: flex;
      gap: 4px;
      background: white;
      padding: 6px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-light);
      font-family: inherit;
    }
    .tab-btn.active { background: var(--primary); color: white; font-weight: 600; }
    .tab-btn:hover:not(.active) { background: var(--bg); color: var(--text); }
    .panel { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
    .form-section { margin-bottom: 24px; }
    .form-section h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: var(--text); }
    label .req { color: var(--danger); margin-left: 2px; }
    input[type="text"], input[type="date"], input[type="number"], select, textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
      background: white;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 100px; }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill-item { position: relative; cursor: pointer; }
    .pill-item input[type="radio"], .pill-item input[type="checkbox"] { display: none; }
    .pill-item span {
      display: block;
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-light);
      transition: all 0.15s;
      user-select: none;
    }
    .pill-item:has(input:checked) span {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .photo-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
    }
    .photo-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
    .photo-upload-area input { display: none; }
    .photo-upload-area .upload-hint { font-size: 13px; color: var(--text-light); margin-top: 6px; }
    .photo-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .photo-thumb {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .photo-thumb .rm-photo {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: inherit;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #229954; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .s-submitted    { background: #f0f0f0; color: #555; }
    .s-accepted     { background: #e3f0fb; color: var(--info); }
    .s-investigating{ background: #fef6e4; color: var(--warning); }
    .s-compensating { background: #f3e8ff; color: var(--purple); }
    .s-closed       { background: #e8f8f0; color: var(--success); }
    /* Progress bar */
    .status-progress { display: flex; align-items: flex-start; margin: 16px 0 8px; }
    .prog-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .prog-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 13px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .prog-step.done:not(:last-child)::after { background: var(--primary); }
    .prog-step.active:not(:last-child)::after { background: var(--border); }
    .step-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      z-index: 1;
      position: relative;
      color: var(--text-light);
    }
    .prog-step.done .step-dot { background: var(--primary); border-color: var(--primary); color: white; }
    .prog-step.active .step-dot {
      background: white;
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    .step-lbl { font-size: 11px; color: var(--text-light); margin-top: 6px; text-align: center; white-space: nowrap; }
    .prog-step.done .step-lbl, .prog-step.active .step-lbl { color: var(--primary); font-weight: 600; }
    /* Cards */
    .c-list { display: flex; flex-direction: column; gap: 12px; }
    .c-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }
    .c-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(224,90,43,0.1); }
    .c-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .c-card-id { font-size: 13px; font-weight: 700; color: var(--primary); }
    .c-card-body { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .c-card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .c-card-meta { font-size: 12px; color: var(--text-light); }
    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: var(--radius);
    }
    .filter-bar select, .filter-bar input[type="date"] { padding: 7px 10px; font-size: 13px; min-width: 120px; }
    .filter-bar .btn { padding: 7px 16px; font-size: 13px; }
    /* Table */
    .adm-table { width: 100%; border-collapse: collapse; }
    .adm-table th {
      background: var(--bg);
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 1px solid var(--border);
    }
    .adm-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .adm-table tr:last-child td { border-bottom: none; }
    .adm-table tr:hover td { background: var(--bg); cursor: pointer; }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2000;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 780px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
      margin: auto 0;
    }
    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 17px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); padding: 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    /* Detail */
    .det-section { margin-bottom: 24px; }
    .det-section h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
    .det-item label { display: block; font-size: 11px; color: var(--text-light); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
    .det-item .val { font-size: 14px; color: var(--text); font-weight: 500; }
    /* Log */
    .log-list { display: flex; flex-direction: column; gap: 6px; }
    .log-row {
      display: flex;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 13px;
    }
    .log-time { color: var(--text-light); white-space: nowrap; min-width: 110px; font-size: 12px; }
    .log-body { flex: 1; }
    .log-action { font-weight: 600; color: var(--text); }
    .log-note { color: var(--text-light); margin-top: 2px; font-size: 12px; }
    .log-by { color: var(--primary); font-size: 12px; margin-top: 2px; }
    /* Compensation */
    .comp-box { background: #fafafa; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .comp-done {
      background: #e8f8f0;
      border: 1.5px solid #a3d9b9;
      border-radius: 6px;
      padding: 12px 16px;
    }
    .comp-done-title { font-size: 12px; font-weight: 700; color: var(--success); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .comp-done-body { font-size: 14px; line-height: 1.7; }
    /* Add log form */
    .add-log-box { background: var(--bg); border-radius: var(--radius); padding: 14px; margin-top: 14px; }
    .add-log-box h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    /* Info box */
    .info-note { background: #e3f0fb; border: 1px solid #aecde8; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #1a6a9e; margin-bottom: 20px; }
    /* Empty state */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-light); }
    .empty-state .ei { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #2c3e50;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2002;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    /* Category modal */
    .cat-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2001;
      overflow-y: auto;
      padding: 24px 16px;
    }
    .cat-modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .cat-modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      overflow: hidden;
      margin: auto 0;
    }
    .cat-modal .modal-header { padding: 16px 20px; }
    .cat-modal .modal-body  { padding: 16px 20px; }
    .cat-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: grab;
      user-select: none;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .cat-item.drag-over { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .cat-item.dragging  { opacity: 0.4; }
    .cat-drag-handle { color: var(--text-light); font-size: 14px; cursor: grab; }
    .cat-name { flex: 1; font-size: 14px; }
    .cat-name-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid var(--primary);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .cat-del-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      font-family: inherit;
    }
    .cat-del-btn:hover { background: #fde8e8; }
    .cat-add-row { display: flex; gap: 8px; }
    .cat-add-row input {
      flex: 1;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .cat-add-row input:focus { border-color: var(--primary); }
    .cat-modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    /* Sidebar layout */
    .member-layout { display: flex; gap: 20px; align-items: flex-start; }
    .sidebar {
      width: 160px;
      flex-shrink: 0;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .sidebar-item:hover { background: var(--bg); color: var(--text); }
    .sidebar-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .content-area { flex: 1; min-width: 0; }
    @media (max-width: 640px) {
      /* Header */
      .site-header { padding: 0 12px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 6px; padding-top: 8px; padding-bottom: 8px; }
      .site-header h1 { font-size: 15px; }
      .site-header > div { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .site-header > div > button { font-size: 11px; padding: 4px 8px; }
      .role-btn { padding: 4px 10px; font-size: 12px; }

      /* Container */
      .main-container { padding: 12px 10px; }

      /* Tabs */
      .tab-bar { padding: 4px; gap: 2px; }
      .tab-btn { padding: 8px 6px; font-size: 12px; }

      /* Forms */
      .form-grid, .det-grid { grid-template-columns: 1fr; }
      .panel { padding: 16px; }
      .form-actions { flex-direction: column; }
      .form-actions .btn { width: 100%; }

      /* Filter bar */
      .filter-bar { flex-direction: column; gap: 8px; padding: 10px; }
      .filter-bar select, .filter-bar input[type="date"] { width: 100%; min-width: unset; }
      .filter-bar .btn { width: 100%; }

      /* Table — scroll horizontally */
      .adm-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .adm-table { min-width: 520px; }
      .adm-table th:nth-child(3), .adm-table td:nth-child(3) { display: none; }

      /* Cards */
      .c-card-body { flex-direction: column; align-items: flex-start; gap: 6px; }

      /* Log */
      .log-row { flex-direction: column; gap: 4px; }
      .log-time { min-width: unset; }

      /* Status progress */
      .step-lbl { font-size: 10px; }

      /* Member sidebar */
      .member-layout { flex-direction: column; }
      .sidebar { width: 100%; display: flex; gap: 4px; }
      .sidebar-item { flex: 1; justify-content: center; font-size: 12px; padding: 8px 4px; }

      /* Modal */
      .modal-overlay { padding: 0; }
      .modal { border-radius: 0; min-height: 100dvh; }
      .modal-body { padding: 16px; }

      /* Toast */
      #toast { left: 12px; right: 12px; bottom: 16px; }
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body>
<script src="shared-nav.js"></script>

<div class="main-container">

  <!-- 會員前台 -->
  <div id="memberView">
    <div class="member-layout">
      <!-- 內容區 -->
      <div class="content-area">
        <!-- 我的訂單 -->
        <div id="panelOrders" class="panel">
          <div id="ordersBody"></div>
        </div>

        <!-- 提出客訴（由我要客訴按鈕進入，不顯示於側邊欄） -->
        <div id="panelSubmit" class="panel" style="display:none">
          <div style="margin-bottom:16px">
            <button class="btn btn-secondary btn-sm" onclick="showMTab('orders')">← 返回我的訂單</button>
          </div>
          <div id="orderBanner" class="info-note">
            📦 訂單 <strong id="bannerOrderId"></strong>（<span id="bannerLoc"></span>）已自動帶入，請填寫客訴內容。
          </div>
          <form id="cForm" onsubmit="submitComplaint(event)">
            <div class="form-section">
              <h3>訂單資訊</h3>
              <div class="form-grid">
                <div class="form-group">
                  <label>訂單編號</label>
                  <input type="text" id="fOrderId" readonly style="background:var(--bg);color:var(--text-light);cursor:default">
                </div>
                <div class="form-group">
                  <label>據點</label>
                  <select id="fLocation" disabled style="background:var(--bg);color:var(--text-light);cursor:default">
                    <option value="">請選擇據點</option>
                    <option>據點A</option>
                    <option>據點B</option>
                    <option>據點C</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="form-section">
              <h3>客訴內容</h3>
              <div class="form-group" style="margin-bottom:16px">
                <label>客訴類型 <span class="req">*</span></label>
                <div class="pill-group" id="typePills"></div>
              </div>
              <div class="form-group" style="margin-bottom:16px">
                <label>問題說明 <span class="req">*</span></label>
                <textarea id="fDesc" rows="4" placeholder="請詳細描述您遇到的問題…" required></textarea>
              </div>
              <div class="form-group">
                <label>附件照片（選填，最多 3 張）</label>
                <div class="photo-upload-area" onclick="document.getElementById('fPhotos').click()">
                  <div style="font-size:28px">📷</div>

// 將類型名稱轉為 key（用於資料欄位，相容既有資料）
function typeKey(name) {
  // 若剛好符合舊 key 就直接用，否則用 base64-like 安全字串
  const legacyMap = { '餐點品質／異物': 'quality', '遲送或未送達': 'delivery', '數量或品項錯誤': 'quantity', '其他': 'other' };
  if (legacyMap[name]) return legacyMap[name];
  return 'type_' + btoa(unescape(encodeURIComponent(name))).replace(/[^a-zA-Z0-9]/g, '').slice(0, 20);
}

// 從 type key 反查 label
function typeLabel(key) {
  // 嘗試舊 key 對應
  const legacyLabels = { quality: '餐點品質／異物', delivery: '遲送或未送達', quantity: '數量或品項錯誤', other: '其他' };
  if (legacyLabels[key]) {
    // 如果使用者已修改過此類型名稱，優先用 complaintTypes 中現有的對應
    const found = complaintTypes.find(n => typeKey(n) === key);
    return found !== undefined ? found : legacyLabels[key];
  }
  const found = complaintTypes.find(n => typeKey(n) === key);
  return found !== undefined ? found : key;
}

// ─── Photo upload ─────────────────────────────────────────────
function addPhotos(input) {
  const files = Array.from(input.files);
  files.forEach(f => {
    if (uploadedPhotos.length >= 3) { showToast('最多上傳 3 張照片'); return; }
    const reader = new FileReader();
    reader.onload = e => resizeImg(e.target.result, 500, 500, d => {
      uploadedPhotos.push({ name: f.name, dataUrl: d });
      renderThumbs();
    });
    reader.readAsDataURL(f);
  });
  input.value = '';
}
function resizeImg(src, mw, mh, cb) {
  const img = new Image();
  img.onload = () => {
    const s = Math.min(mw / img.width, mh / img.height, 1);
    const c = document.createElement('canvas');
    c.width = img.width * s; c.height = img.height * s;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    cb(c.toDataURL('image/jpeg', 0.72));
  };
  img.src = src;
}
function renderThumbs() {
  document.getElementById('photoPreviews').innerHTML = uploadedPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.dataUrl}" alt="${p.name}">
      <button class="rm-photo" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}
function removePhoto(i) { uploadedPhotos.splice(i, 1); renderThumbs(); }

  const to   = document.getElementById('fTo').value;

    (!loc  || c.location === loc) &&
    (!type || c.type === type) &&
    (!stat || c.status === stat) &&
    (!from || c.createdAt >= from) &&
    (!to   || c.createdAt.slice(0,10) <= to)

}

  const tpLabel = typeLabel(c.type);
  const mem  = MEMBERS[c.memberId] || { name: c.memberId, phone: '—' };
  const sidx = STATUSES.findIndex(s => s.key === c.status);

  document.getElementById('modalTitle').textContent = `客訴詳情 ${c.id}`;

  let h = '';

  // Progress bar
  h += `<div class="det-section"><h3>處理進度</h3>
    <div class="status-progress">${STATUSES.map((s,i) => {
      const cls = i < sidx ? 'done' : i === sidx ? 'active' : '';
      return `<div class="prog-step ${cls}">
        <div class="step-dot">${i < sidx ? '✓' : i+1}</div>
        <div class="step-lbl">${s.label}</div>
      </div>`;
    }).join('')}</div>
  </div>`;

  // Info
  h += `<div class="det-section"><h3>訂單與會員資訊</h3>
    <div class="det-grid">
      <div class="det-item"><label>案件編號</label><div class="val">${c.id}</div></div>
      <div class="det-item"><label>提報時間</label><div class="val">${fmtDate(c.createdAt)}</div></div>
      <div class="det-item"><label>訂單編號</label><div class="val">${c.orderId}</div></div>
      <div class="det-item"><label>據點</label><div class="val">${c.location}</div></div>
      ${isAdmin ? `<div class="det-item"><label>會員姓名</label><div class="val">${mem.name}</div></div>
      <div class="det-item"><label>聯絡電話</label><div class="val">${mem.phone}</div></div>` : ''}
    </div>
  </div>`;

  // Complaint content
  h += `<div class="det-section"><h3>客訴內容</h3>
    <div class="det-grid" style="margin-bottom:12px">
      <div class="det-item"><label>客訴類型</label><div class="val">${tpLabel}</div></div>
      <div class="det-item"><label>目前狀態</label><div class="val"><span class="badge ${st.cls}">${st.icon} ${st.label}</span></div></div>
    </div>
    <div class="det-item" style="margin-bottom:${c.photos&&c.photos.length?'12px':'0'}">
      <label>問題說明</label>
      <div class="val" style="margin-top:6px;line-height:1.7;background:var(--bg);padding:12px;border-radius:6px">${esc(c.description)}</div>
    </div>
    ${c.photos&&c.photos.length ? `<div class="det-item" style="margin-top:12px"><label>附件照片</label>
      <div class="photo-previews" style="margin-top:8px">${c.photos.map(p=>`<div class="photo-thumb"><img src="${p.dataUrl}" alt="${p.name}"></div>`).join('')}</div>
    </div>` : ''}
  </div>`;

  // Admin: status mgmt
  if (isAdmin) {
    h += `<div class="det-section"><h3>狀態管理</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <select id="selStatus" style="flex:1;min-width:160px">
          ${STATUSES.map(s=>`<option value="${s.key}"${s.key===c.status?' selected':''}>${s.icon} ${s.label}</option>`).join('')}
        </select>
        <input type="text" id="inpStatusNote" placeholder="備註說明（選填）" style="flex:2;min-width:180px">
        <button class="btn btn-primary" onclick="updateStatus('${c.id}')">更新狀態</button>
      </div>
    </div>`;

    // Compensation
    h += `<div class="det-section"><h3>補償操作</h3><div class="comp-box">
      ${c.compensation ? compResultHtml(c) : compFormHtml(c.id)}
    </div></div>`;
  }

  // Logs
  h += `<div class="det-section"><h3>處理紀錄</h3>
    <div class="log-list">${[...c.logs].reverse().map(l=>`
      <div class="log-row">
        <div class="log-time">${fmtDate(l.time)}</div>
        <div class="log-body">
          <div class="log-action">${esc(l.action)}</div>
          ${l.note ? `<div class="log-note">${esc(l.note)}</div>` : ''}
          <div class="log-by">— ${esc(l.operator)}</div>
        </div>
      </div>`).join('')}
    </div>
    ${isAdmin ? `<div class="add-log-box"><h4>新增處理紀錄</h4>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input type="text" id="inpLogAct" placeholder="處理動作" style="flex:1;min-width:150px">
        <input type="text" id="inpLogNote" placeholder="詳細說明（選填）" style="flex:2;min-width:180px">
        <button class="btn btn-secondary" onclick="addLog('${c.id}')">新增</button>
      </div></div>` : ''}
  </div>`;

  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('modalOverlay').classList.add('open');
}

function compFormHtml(id) {
  return `<div style="margin-bottom:14px">
    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px">補償方式</label>
    <div class="pill-group">
      <label class="pill-item"><input type="radio" name="compType" value="coupon" onchange="toggleComp()"><span>🎟 發折價券</span></label>
      <label class="pill-item"><input type="radio" name="compType" value="refund" onchange="toggleComp()"><span>💳 退款</span></label>
    </div>
  </div>
  <div id="couponFields" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="form-group"><label>折扣金額（元）</label><input type="number" id="inpCouponAmt" placeholder="例：100" min="1"></div>
      <div class="form-group"><label>有效期限</label><input type="date" id="inpCouponExp"></div>
      <div class="form-group" style="grid-column:1/-1"><label>備註</label><input type="text" id="inpCouponNote" placeholder="補償說明"></div>
    </div>
    <button class="btn btn-success" onclick="applyComp('${id}','coupon')">🎟 核發折價券</button>
  </div>
  <div id="refundFields" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="form-group"><label>退款金額（元）</label><input type="number" id="inpRefundAmt" placeholder="例：120" min="1"></div>
      <div class="form-group"><label>退款狀態</label>
        <select id="inpRefundStat"><option value="pending">待處理</option><option value="processing">處理中</option><option value="completed">已完成</option></select>
      </div>
      <div class="form-group" style="grid-column:1/-1"><label>備註</label><input type="text" id="inpRefundNote" placeholder="退款說明"></div>
    </div>
    <button class="btn btn-success" onclick="applyComp('${id}','refund')">💳 建立退款</button>
  </div>`;
}

function compResultHtml(c) {
  const cp = c.compensation;
  const smap = { pending:'待處理', processing:'處理中', completed:'已完成' };
  if (cp.type === 'coupon') {
    return `<div class="comp-done">
      <div class="comp-done-title">🎟 已核發折價券</div>
      <div class="comp-done-body">券號：<strong>${cp.couponCode}</strong><br>金額：<strong>$${cp.amount}</strong>　有效期限：${cp.expiry}<br>${cp.note ? '備註：' + esc(cp.note) : ''}</div>
    </div>`;
  } else {
    return `<div class="comp-done" style="margin-bottom:12px">
      <div class="comp-done-title">💳 退款追蹤</div>
      <div class="comp-done-body">退款金額：<strong>$${cp.refundAmount}</strong>　狀態：<strong>${smap[cp.refundStatus]||cp.refundStatus}</strong>${cp.refundTime ? '　完成：'+fmtDate(cp.refundTime) : ''}<br>${cp.note ? '備註：'+esc(cp.note) : ''}</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <label style="font-size:13px;font-weight:500;white-space:nowrap">更新退款狀態：</label>
      <select id="selRefundUpd" style="flex:1">
        <option value="pending"${cp.refundStatus==='pending'?' selected':''}>待處理</option>
        <option value="processing"${cp.refundStatus==='processing'?' selected':''}>處理中</option>
        <option value="completed"${cp.refundStatus==='completed'?' selected':''}>已完成</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="updateRefund('${c.id}')">更新</button>
    </div>`;
  }
}

function toggleComp() {
  const v = document.querySelector('input[name="compType"]:checked')?.value;
  document.getElementById('couponFields').style.display = v==='coupon' ? '' : 'none';
  document.getElementById('refundFields').style.display = v==='refund' ? '' : 'none';
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ─── Category Modal ───────────────────────────────────────────
let catWorkingList = []; // 編輯中的暫存清單
let dragSrcIdx = null;

function openCatModal() {
  catWorkingList = [...complaintTypes];
  renderCatList();
  document.getElementById('catNewInput').value = '';
  document.getElementById('catModalOverlay').classList.add('open');
}
function closeCatModal() {
  document.getElementById('catModalOverlay').classList.remove('open');
}
function onCatOverlayClick(e) {
  if (e.target === document.getElementById('catModalOverlay')) closeCatModal();
}

function renderCatList() {
  const ul = document.getElementById('catList');
  ul.innerHTML = catWorkingList.map((t, i) => `
    <li class="cat-item" draggable="true" data-idx="${i}"
        ondragstart="onCatDragStart(event,${i})"
        ondragover="onCatDragOver(event,${i})"
        ondragleave="onCatDragLeave(event)"
        ondrop="onCatDrop(event,${i})"
        ondragend="onCatDragEnd(event)">
      <span class="cat-drag-handle">☰</span>
      <span class="cat-name" ondblclick="startCatRename(${i})">${esc(t)}</span>
      <button class="cat-del-btn" onclick="deleteCatType(${i})" title="刪除">✕</button>
    </li>`).join('');
}

function startCatRename(idx) {
  const ul = document.getElementById('catList');
  const li = ul.querySelector(`[data-idx="${idx}"]`);
  if (!li) return;
  const nameSpan = li.querySelector('.cat-name');
  const oldVal = catWorkingList[idx];
  nameSpan.outerHTML = `<input class="cat-name-input" data-idx="${idx}" value="${esc(oldVal)}"
    onblur="finishCatRename(${idx},this.value)"
    onkeydown="if(event.key==='Enter'){this.blur();}if(event.key==='Escape'){finishCatRenameCancel(${idx});}">`;
  const inp = li.querySelector('.cat-name-input');
  inp.focus();
  inp.select();
}
function finishCatRename(idx, newVal) {
  newVal = newVal.trim();
  if (newVal && newVal !== catWorkingList[idx]) {
    catWorkingList[idx] = newVal;
  }
  renderCatList();
}
function finishCatRenameCancel(idx) {
  renderCatList();
}

function addCatType() {
  const inp = document.getElementById('catNewInput');
  const val = inp.value.trim();
  if (!val) { showToast('請輸入類型名稱'); return; }
  if (catWorkingList.includes(val)) { showToast('已存在相同類型'); return; }
  catWorkingList.push(val);
  inp.value = '';
  renderCatList();
}

function deleteCatType(idx) {
  const name = catWorkingList[idx];
  const key  = typeKey(name);
  const inUse = complaints.some(c => c.type === key);
  if (inUse) {
    alert(`「${name}」目前有客訴資料使用中，無法刪除。`);
    return;
  }
  catWorkingList.splice(idx, 1);
  renderCatList();
}

function saveCatTypes() {
  // 找出哪些類型被改名，同步更新 complaints 資料
  const oldTypes = complaintTypes;
  const newTypes = catWorkingList;
  // 建立 old key → new key 的對照（依位置配對，新增或刪除的直接忽略）
  const minLen = Math.min(oldTypes.length, newTypes.length);
  for (let i = 0; i < minLen; i++) {
    const oldKey = typeKey(oldTypes[i]);
    const newKey = typeKey(newTypes[i]);
    if (oldKey !== newKey) {
      complaints.forEach(c => { if (c.type === oldKey) c.type = newKey; });
    }
  }
  complaintTypes = [...newTypes];
  saveTypes();
  save();
  populateTypeSelects();
  closeCatModal();
  // 重新渲染
  if (currentRole === 'admin') renderAdminList();
  else renderMyList();
  showToast('✅ 類型設定已儲存');
}

// ─── Drag & Drop for cat list ─────────────────────────────────
function onCatDragStart(e, idx) {
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onCatDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('drag-over'));
  if (idx !== dragSrcIdx) e.currentTarget.classList.add('drag-over');
}
function onCatDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onCatDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const moved = catWorkingList.splice(dragSrcIdx, 1)[0];
  catWorkingList.splice(idx, 0, moved);
  dragSrcIdx = null;
  renderCatList();
}
function onCatDragEnd(e) {
  dragSrcIdx = null;
  document.querySelectorAll('.cat-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

// ─── Admin actions ────────────────────────────────────────────
function updateStatus(id) {
  const c = complaints.find(x => x.id === id); if (!c) return;
  const ns = document.getElementById('selStatus').value;
  const note = document.getElementById('inpStatusNote').value.trim();
  if (ns === c.status) { showToast('狀態未變更'); return; }
  const lbl = STATUSES.find(s => s.key === ns)?.label;
  c.status = ns;
  c.updatedAt = new Date().toISOString();
  c.logs.push({ time: new Date().toISOString(), action: `狀態更新：${lbl}`, operator: '客服人員', note });
  save(); showToast(`✅ 狀態已更新為「${lbl}」`);
  refresh(id);
}

function applyComp(id, type) {
  const c = complaints.find(x => x.id === id); if (!c) return;
  if (type === 'coupon') {
    const amt = parseInt(document.getElementById('inpCouponAmt').value);
    const exp = document.getElementById('inpCouponExp').value;
    const note = document.getElementById('inpCouponNote').value.trim();
    if (!amt || amt <= 0) { showToast('請輸入有效金額'); return; }
    if (!exp) { showToast('請選擇有效期限'); return; }
    const code = genCoupon();
    c.compensation = { type:'coupon', couponCode:code, amount:amt, expiry:exp, note, refundStatus:null, refundAmount:0, refundTime:null };
    c.logs.push({ time:new Date().toISOString(), action:'補償處理', operator:'客服人員', note:`核發折價券 ${code}，$${amt}，有效至 ${exp}` });
    showToast(`🎟 折價券已核發：${code}`);
  } else {
    const amt = parseInt(document.getElementById('inpRefundAmt').value);
    const stat = document.getElementById('inpRefundStat').value;
    const note = document.getElementById('inpRefundNote').value.trim();
    if (!amt || amt <= 0) { showToast('請輸入有效退款金額'); return; }
    const smap = { pending:'待處理', processing:'處理中', completed:'已完成' };
    c.compensation = { type:'refund', couponCode:null, amount:0, expiry:null, note, refundStatus:stat, refundAmount:amt, refundTime: stat==='completed' ? new Date().toISOString() : null };
    c.logs.push({ time:new Date().toISOString(), action:'補償處理', operator:'客服人員', note:`建立退款 $${amt}，狀態：${smap[stat]}` });
    showToast(`💳 退款已建立：$${amt}`);
  }
  if (c.status !== 'compensating' && c.status !== 'closed') {
    c.status = 'compensating';
    c.logs.push({ time:new Date().toISOString(), action:'狀態更新：補償處理', operator:'系統', note:'補償操作後自動更新' });
  }
  c.updatedAt = new Date().toISOString();
  save(); refresh(id);
}

function updateRefund(id) {
  const c = complaints.find(x => x.id === id); if (!c || !c.compensation) return;
  const ns = document.getElementById('selRefundUpd').value;
  c.compensation.refundStatus = ns;
  if (ns === 'completed') c.compensation.refundTime = new Date().toISOString();
  const smap = { pending:'待處理', processing:'處理中', completed:'已完成' };
  c.logs.push({ time:new Date().toISOString(), action:'更新退款狀態', operator:'財務人員', note:`退款狀態更新為：${smap[ns]}` });
  c.updatedAt = new Date().toISOString();
  save(); showToast('✅ 退款狀態已更新'); refresh(id);
}

function addLog(id) {
  const act = document.getElementById('inpLogAct').value.trim();
  if (!act) { showToast('請輸入處理動作'); return; }
  const note = document.getElementById('inpLogNote').value.trim();
  const c = complaints.find(x => x.id === id); if (!c) return;
  c.logs.push({ time:new Date().toISOString(), action:act, operator:'客服人員', note });
  c.updatedAt = new Date().toISOString();
  save(); showToast('✅ 處理紀錄已新增'); refresh(id);
}

function refresh(id) {
  closeModal();
  if (currentRole === 'admin') renderAdminList();
  else renderMyList();
  setTimeout(() => openModal(id, currentRole === 'admin'), 80);
}

// ─── Utils ────────────────────────────────────────────────────
function genId() {
  const d = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const n = String(complaints.length + 1).padStart(3,'0');
  return `CMP-${d}-${n}`;
}
function genCoupon() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return 'COMP-' + Array.from({length:5}, () => c[Math.floor(Math.random()*c.length)]).join('');
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})
       + ' ' + d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}
function fmtShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.style.display = 'none', 3000);
}

function resetData() {
  if (!confirm('確定要清除所有資料並還原為預設範例？')) return;
  localStorage.removeItem('cmp_v1');
  localStorage.removeItem('cmp_types_v1');
  complaints = defaultData();
  complaintTypes = ['餐點品質／異物', '遲送或未送達', '數量或品項錯誤', '其他'];
  save();
  saveTypes();
  populateTypeSelects();
  renderMyList();
  renderAdminList();
  showToast('✅ 資料已重設');
}

// ─── Init ─────────────────────────────────────────────────────
loadTypes();
load();
populateTypeSelects();
renderOrders();

// URL 參數初始化（供全域導覽使用）
(function () {
  var _p = new URLSearchParams(location.search);
  var _mode = _p.get('mode');
  var _tab  = _p.get('tab');
  if (_mode) switchRole(_mode);
  if (_tab)  showMTab(_tab);
})();
</script>
