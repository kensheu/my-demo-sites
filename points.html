<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>點數管理</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --primary-border: #bfdbfe;
      --primary-text: #1e40af;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      font-size: 18px;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--gray-900); }
    .page-sub { font-size: 13px; color: var(--gray-500); margin-top: 3px; margin-bottom: 24px; }

    /* ── Section 卡片 ── */
    .section-card {
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: 10px; padding: 22px 24px; margin-bottom: 18px;
    }
    .section-title {
      font-size: 15px; font-weight: 700; color: var(--gray-900);
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--gray-200);
    }

    /* ── 規則設定 ── */
    .rule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    @media(max-width:600px) { .rule-grid { grid-template-columns: 1fr; } }
    .rule-box {
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 8px; padding: 16px;
    }
    .rule-label { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-bottom: 10px; }
    .rule-inline { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 14px; color: var(--gray-700); }
    .rule-input {
      width: 64px; border: 1px solid var(--gray-300); border-radius: 6px;
      padding: 5px 8px; font-size: 14px; font-family: inherit;
      color: var(--gray-800); text-align: center;
    }
    .rule-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
    .btn-primary {
      background: var(--primary); color: #fff; border: none;
      border-radius: 7px; padding: 8px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--primary-text); }

    /* ── 促銷表格 ── */
    .toolbar { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--gray-50); font-size: 12px; font-weight: 600;
      color: var(--gray-500); text-align: left; padding: 10px 14px;
      border-bottom: 1px solid var(--gray-200); white-space: nowrap;
    }
    td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    .tbl-empty { text-align: center; padding: 32px; color: var(--gray-400); }
    .tbl-muted { color: var(--gray-400); }

    /* ── 狀態/類型 chip ── */
    .chip {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 100px;
    }
    .chip-active  { background: var(--success-bg); color: var(--success); border: 1px solid #bbf7d0; }
    .chip-inactive { background: var(--gray-100); color: var(--gray-400); border: 1px solid var(--gray-200); }
    .chip-multiplier { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .chip-direct { background: var(--primary-light); color: var(--primary-text); border: 1px solid var(--primary-border); }

    /* 開關 */
    .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--gray-300); border-radius: 22px; transition: .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: .2s;
    }
    input:checked + .toggle-slider { background: var(--primary); }
    input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* ── 按鈕 ── */
    .btn-sm {
      background: none; border: 1px solid var(--gray-300); color: var(--gray-600);
      border-radius: 5px; padding: 3px 10px; font-size: 12px; cursor: pointer;
    }
    .btn-sm:hover { background: var(--gray-50); }
    .btn-sm-danger {
      border-color: var(--danger); color: var(--danger);
    }
    .btn-sm-danger:hover { background: var(--danger-light); }

    /* ── 搜尋 ── */
    .tbl-search {
      border: 1px solid var(--gray-300); border-radius: 7px;
      padding: 7px 12px; font-size: 13px; color: var(--gray-800);
      width: 240px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; width: 90%; max-width: 460px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18); overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray-500); }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 14px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 10px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; display: block; }
    .form-control {
      width: 100%; border: 1px solid var(--gray-300); border-radius: 6px;
      padding: 8px 10px; font-size: 13px; color: var(--gray-800); font-family: inherit;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-cancel-modal {
      background: var(--gray-100); color: var(--gray-700); border: none;
      border-radius: 6px; padding: 9px 18px; font-size: 13px; cursor: pointer;
    }
    .btn-confirm-modal {
      background: var(--primary); color: #fff; border: none;
      border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-confirm-modal:hover { background: var(--primary-text); }
    .type-options { display: flex; gap: 12px; }
    .type-option { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
    .extra-field { margin-top: 10px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1f2937; color: #fff; padding: 11px 18px;
      border-radius: 8px; font-size: 13px; z-index: 3000;
      display: none; box-shadow: 0 4px 16px rgba(0,0,0,.2);
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body>
<script src="shared-nav.js"></script>

<div class="page">
  <div class="page-title">點數管理</div>
  <div class="page-sub">設定點數累積規則、兌換比例與節日促銷活動</div>

  <!-- 區塊一：點數規則設定 -->
  <div class="section-card">
    <div class="section-title">點數規則設定</div>
    <div class="rule-grid">
      <div class="rule-box">
        <div class="rule-label">累積規則</div>
        <div class="rule-inline">
          每消費
          <input type="number" class="rule-input" id="earnPerAmount" min="1" value="10">
          元 得
          <input type="number" class="rule-input" id="earnPerUnit" min="1" value="1">
          點
        </div>
      </div>
      <div class="rule-box">
        <div class="rule-label">兌換規則</div>
        <div class="rule-inline">
          每
          <input type="number" class="rule-input" id="redeemPoints" min="1" value="100">
          點 換
          $<input type="number" class="rule-input" id="redeemAmount" min="1" value="10">
          折價券
        </div>
      </div>
    </div>
    <button class="btn-primary" onclick="saveRules()">儲存規則</button>
  </div>

  <!-- 區塊二：節日促銷設定 -->
  <div class="section-card">
    <div class="section-title">節日促銷設定</div>
    <div class="toolbar">
      <button class="btn-primary" onclick="openPromoModal()">＋ 新增促銷</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>促銷名稱</th><th>類型</th><th>起始日</th><th>結束日</th><th>內容</th><th>狀態</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="promoTbody"></tbody>
    </table>
  </div>

  <!-- 區塊三：會員點數查詢 -->
  <div class="section-card">
    <div class="section-title">會員點數查詢</div>
    <div style="margin-bottom:12px">
      <input type="text" class="tbl-search" id="memberSearch" placeholder="搜尋姓名或會員編號…" oninput="renderMembersTable()">
    </div>
    <table>
      <thead>
        <tr><th>會員編號</th><th>姓名</th><th>點數</th><th>訂閱方案</th></tr>
      </thead>
      <tbody id="memberTbody"></tbody>
    </table>
  </div>
</div>

<!-- 新增促銷 Modal -->
<div class="modal-overlay" id="promoModal">
  <div class="modal">
    <div class="modal-header">
      <h2>新增節日促銷</h2>
      <button class="modal-close" onclick="closePromoModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">促銷名稱 <span style="color:#dc2626">*</span></label>
        <input type="text" class="form-control" id="promoName" placeholder="例：中秋節點數雙倍">
      </div>
      <div class="form-group">
        <label class="form-label">促銷類型</label>
        <div class="type-options">
          <label class="type-option">
            <input type="radio" name="promoType" value="multiplier" checked onchange="togglePromoTypeFields()">
            點數倍數
          </label>
          <label class="type-option">
            <input type="radio" name="promoType" value="direct_coupon" onchange="togglePromoTypeFields()">
            直接發折價券
          </label>
        </div>
        <div class="extra-field" id="fieldMultiplier">
          <label class="form-label" style="margin-top:8px">倍數</label>
          <input type="number" class="form-control" id="promoMultiplier" min="2" max="10" value="2">
        </div>
        <div class="extra-field" id="fieldCoupon" style="display:none">
          <label class="form-label" style="margin-top:8px">折價券金額（元）</label>
          <input type="number" class="form-control" id="promoCouponAmount" min="1" value="30">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">起始日 <span style="color:#dc2626">*</span></label>
          <input type="date" class="form-control" id="promoStart">
        </div>
        <div class="form-group">
          <label class="form-label">結束日 <span style="color:#dc2626">*</span></label>
          <input type="date" class="form-control" id="promoEnd">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closePromoModal()">取消</button>
      <button class="btn-confirm-modal" onclick="confirmAddPromo()">新增</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var POINTS_KEY = 'points_settings_v1';
var MEMBERS_KEY = 'permissions_members_v2';

var promos = [];
var membersList = [];

function defaultSettings() {
  return {
    earnRule: { perAmount: 10, earnPerUnit: 1 },
    redeemRule: { pointsNeeded: 100, couponAmount: 10 },
    promos: [
      { id: 'promo_001', name: '清明節點數雙倍', type: 'multiplier', multiplier: 2, couponAmount: 0, startDate: '2026-04-04', endDate: '2026-04-06', active: true },
      { id: 'promo_002', name: '母親節直接發券', type: 'direct_coupon', multiplier: 1, couponAmount: 50, startDate: '2026-05-10', endDate: '2026-05-12', active: false }
    ]
  };
}

function defaultMembersSimple() {
  return [
    { id: 'mem_1', memberNo: 'M0001', name: '陳大文', points: 350, subscriptionPlan: 'plan_premium' },
    { id: 'mem_2', memberNo: 'M0002', name: '林小花', points: 200, subscriptionPlan: 'plan_basic' },
    { id: 'mem_3', memberNo: 'M0003', name: '黃阿明', points: 80,  subscriptionPlan: 'plan_none' },
    { id: 'mem_4', memberNo: 'M0004', name: '吳美麗', points: 0,   subscriptionPlan: 'plan_none' },
    { id: 'mem_5', memberNo: 'M0005', name: '張建國', points: 0,   subscriptionPlan: 'plan_none' }
  ];
}

function loadSettings() {
  try {
    var s = sessionStorage.getItem(POINTS_KEY);
    return s ? JSON.parse(s) : defaultSettings();
  } catch(e) { return defaultSettings(); }
}

function saveSettings(data) {
  sessionStorage.setItem(POINTS_KEY, JSON.stringify(data));
}

function loadMembers() {
  try {
    var s = sessionStorage.getItem(MEMBERS_KEY);
    var raw = s ? JSON.parse(s) : null;
    return raw ? raw.map(function(m) {
      return { id: m.id, memberNo: m.memberNo, name: m.name, points: m.points || 0, subscriptionPlan: m.subscriptionPlan || 'plan_none' };
    }) : defaultMembersSimple();
  } catch(e) { return defaultMembersSimple(); }
}

function init() {
  var data = loadSettings();
  document.getElementById('earnPerAmount').value  = data.earnRule.perAmount;
  document.getElementById('earnPerUnit').value    = data.earnRule.earnPerUnit;
  document.getElementById('redeemPoints').value   = data.redeemRule.pointsNeeded;
  document.getElementById('redeemAmount').value   = data.redeemRule.couponAmount;
  promos = data.promos || [];
  membersList = loadMembers();
  renderPromos();
  renderMembersTable();
}

function saveRules() {
  var data = loadSettings();
  data.earnRule.perAmount    = parseInt(document.getElementById('earnPerAmount').value, 10) || 10;
  data.earnRule.earnPerUnit  = parseInt(document.getElementById('earnPerUnit').value, 10) || 1;
  data.redeemRule.pointsNeeded = parseInt(document.getElementById('redeemPoints').value, 10) || 100;
  data.redeemRule.couponAmount = parseInt(document.getElementById('redeemAmount').value, 10) || 10;
  saveSettings(data);
  showToast('✅ 點數規則已儲存');
}

var PLAN_NAMES = { plan_none: '一般方案', plan_basic: '月訂閱', plan_premium: '年訂閱' };

function renderPromos() {
  var tbody = document.getElementById('promoTbody');
  if (!promos.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="tbl-empty">尚無促銷活動</td></tr>';
    return;
  }
  tbody.innerHTML = promos.map(function(p) {
    var typeChip = p.type === 'multiplier'
      ? '<span class="chip chip-multiplier">點數 x' + p.multiplier + '</span>'
      : '<span class="chip chip-direct">發券 $' + p.couponAmount + '</span>';
    var content = p.type === 'multiplier' ? '點數 × ' + p.multiplier + ' 倍' : '每人發 $' + p.couponAmount + ' 折價券';
    var stateChip = p.active
      ? '<span class="chip chip-active">啟用中</span>'
      : '<span class="chip chip-inactive">已停用</span>';
    var toggleLabel = p.active ? '停用' : '啟用';
    return '<tr>' +
      '<td style="font-weight:600">' + escHtml(p.name) + '</td>' +
      '<td>' + typeChip + '</td>' +
      '<td class="tbl-muted">' + escHtml(p.startDate) + '</td>' +
      '<td class="tbl-muted">' + escHtml(p.endDate) + '</td>' +
      '<td class="tbl-muted">' + escHtml(content) + '</td>' +
      '<td>' + stateChip + '</td>' +
      '<td><div style="display:flex;gap:6px">' +
        '<button class="btn-sm" onclick="togglePromo(\'' + p.id + '\')">' + toggleLabel + '</button>' +
        '<button class="btn-sm btn-sm-danger" onclick="deletePromo(\'' + p.id + '\')">刪除</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function togglePromo(id) {
  var p = promos.find(function(x) { return x.id === id; });
  if (!p) return;
  p.active = !p.active;
  var data = loadSettings();
  data.promos = promos;
  saveSettings(data);
  renderPromos();
  showToast((p.active ? '✅ 促銷「' + p.name + '」已啟用' : '⏸️ 促銷「' + p.name + '」已停用'));
}

function deletePromo(id) {
  var p = promos.find(function(x) { return x.id === id; });
  if (!p) return;
  if (!confirm('確定要刪除促銷活動「' + p.name + '」？')) return;
  promos = promos.filter(function(x) { return x.id !== id; });
  var data = loadSettings();
  data.promos = promos;
  saveSettings(data);
  renderPromos();
  showToast('🗑️ 促銷已刪除');
}

function renderMembersTable() {
  var q = (document.getElementById('memberSearch').value || '').trim().toLowerCase();
  var filtered = q ? membersList.filter(function(m) {
    return (m.name + ' ' + (m.memberNo || '')).toLowerCase().indexOf(q) !== -1;
  }) : membersList;
  var tbody = document.getElementById('memberTbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="tbl-empty">找不到符合的會員</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(m) {
    var plan = m.subscriptionPlan || 'plan_none';
    var planName = PLAN_NAMES[plan] || '一般方案';
    var chipClass = plan === 'plan_premium' ? 'background:#fefce8;color:#92400e;border:1px solid #fde68a' :
                    plan === 'plan_basic'   ? 'background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe' :
                                              'background:#f3f4f6;color:#4b5563;border:1px solid #d1d5db';
    return '<tr>' +
      '<td class="tbl-muted">' + escHtml(m.memberNo || '—') + '</td>' +
      '<td style="font-weight:600">' + escHtml(m.name) + '</td>' +
      '<td><strong style="font-size:15px">' + (m.points || 0) + '</strong> <span class="tbl-muted">點</span></td>' +
      '<td><span style="display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;' + chipClass + '">' + planName + '</span></td>' +
    '</tr>';
  }).join('');
}

function openPromoModal() {
  document.getElementById('promoName').value = '';
  document.getElementById('promoMultiplier').value = '2';
  document.getElementById('promoCouponAmount').value = '30';
  document.querySelector('input[name="promoType"][value="multiplier"]').checked = true;
  togglePromoTypeFields();
  var today = new Date();
  document.getElementById('promoStart').value = today.toISOString().slice(0,10);
  var end = new Date(today);
  end.setDate(end.getDate() + 2);
  document.getElementById('promoEnd').value = end.toISOString().slice(0,10);
  document.getElementById('promoModal').classList.add('open');
}

function closePromoModal() {
  document.getElementById('promoModal').classList.remove('open');
}

function togglePromoTypeFields() {
  var type = document.querySelector('input[name="promoType"]:checked').value;
  document.getElementById('fieldMultiplier').style.display = type === 'multiplier' ? '' : 'none';
  document.getElementById('fieldCoupon').style.display = type === 'direct_coupon' ? '' : 'none';
}

function confirmAddPromo() {
  var name = document.getElementById('promoName').value.trim();
  if (!name) { document.getElementById('promoName').classList.add('error'); return; }
  document.getElementById('promoName').classList.remove('error');
  var type = document.querySelector('input[name="promoType"]:checked').value;
  var newPromo = {
    id: 'promo_' + Date.now(),
    name: name,
    type: type,
    multiplier: type === 'multiplier' ? parseInt(document.getElementById('promoMultiplier').value, 10) || 2 : 1,
    couponAmount: type === 'direct_coupon' ? parseInt(document.getElementById('promoCouponAmount').value, 10) || 30 : 0,
    startDate: document.getElementById('promoStart').value,
    endDate: document.getElementById('promoEnd').value,
    active: true
  };
  promos.unshift(newPromo);
  var data = loadSettings();
  data.promos = promos;
  saveSettings(data);
  closePromoModal();
  renderPromos();
  showToast('✅ 促銷「' + name + '」已新增');
}

document.getElementById('promoModal').addEventListener('click', function(e) {
  if (e.target === this) closePromoModal();
});

var _toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.style.display = 'none'; }, 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
