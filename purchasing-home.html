<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採購部首頁</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f3f2ef;
  --card:     #ffffff;
  --border:   #e5e5e4;
  --text:     #1c1b1a;
  --text-2:   #57534e;
  --text-3:   #a8a29e;
  --red:      #dc2626;
  --orange:   #d97706;
  --green:    #16a34a;
  --blue:     #1d4ed8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
               "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* ─── KPI Cards ─── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
@media (max-width: 640px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 360px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: var(--card);
  border-radius: 10px;
  padding: 18px 18px 14px;
}

.kpi-label {
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 10px;
}
.kpi-num {
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}
.kpi-num.red    { color: var(--red); }
.kpi-num.orange { color: var(--orange); }
.kpi-num.neutral{ color: var(--text); }
.kpi-num.green  { color: var(--green); }

.kpi-sub { font-size: 11px; color: var(--text-3); }

/* ─── Section title ─── */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

/* ─── Quick Links ─── */
.qlink-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 480px) { .qlink-grid { grid-template-columns: 1fr; } }

.qlink {
  background: var(--card);
  border-radius: 10px;
  padding: 18px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: var(--text);
  transition: box-shadow .15s;
}
.qlink:hover {
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
}

.qlink-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.qi-blue   { background: #dbeafe; }
.qi-green  { background: #dcfce7; }
.qi-orange { background: #ffedd5; }
.qi-gray   { background: #f3f4f6; }

.qlink-text .t { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.qlink-text .d { font-size: 12px; color: var(--text-3); }
</style>
</head>
<body>
<div class="page">

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">待審核異動</div>
      <div class="kpi-num red">7</div>
      <div class="kpi-sub">店家提交，尚未核准</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">本週即將生效</div>
      <div class="kpi-num orange">3</div>
      <div class="kpi-sub">店內價預約生效</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">本月有異動餐廳</div>
      <div class="kpi-num neutral">12</div>
      <div class="kpi-sub">共 8 家已核准</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">本月新增品項</div>
      <div class="kpi-num green">23</div>
      <div class="kpi-sub">較上月 +5</div>
    </div>
  </div>

  <!-- Quick Links -->
  <div class="section-title">快速功能</div>
  <div class="qlink-grid">
    <a class="qlink" href="price-change-log.html">
      <div class="qlink-icon qi-blue">📊</div>
      <div class="qlink-text">
        <div class="t">本月快照查詢</div>
        <div class="d">查詢各餐廳本月價格</div>
      </div>
    </a>
    <a class="qlink" href="#">
      <div class="qlink-icon qi-green">＋</div>
      <div class="qlink-text">
        <div class="t">新增餐廳</div>
        <div class="d">建立客戶供應商資料</div>
      </div>
    </a>
    <a class="qlink" href="#">
      <div class="qlink-icon qi-orange">✦</div>
      <div class="qlink-text">
        <div class="t">新增餐點品項</div>
        <div class="d">手動建立或批次上傳</div>
      </div>
    </a>
    <a class="qlink" href="change-review.html">
      <div class="qlink-icon qi-gray">☰</div>
      <div class="qlink-text">
        <div class="t">異動紀錄查詢</div>
        <div class="d">查詢歷史價格異動</div>
      </div>
    </a>
  </div>

</div>
</body>
</html>
